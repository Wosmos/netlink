<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Todo App</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>
<body class="center-viewport">
    <div class="card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="logo">✨ Todo</div>
            <h1 class="heading-l" style="margin-top: 16px;">Create Account</h1>
            <p class="text-s">Start organizing your tasks</p>
        </div>
        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
        <form method="POST" action="/register">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <p class="text-s" style="margin-top: 6px;">Must be at least 8 characters</p>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>
        <p class="text-s" style="text-align: center; margin-top: 20px;">
            Already have an account? <a href="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</body>
</html>
