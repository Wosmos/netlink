<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Todo App</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>

<body class="center-viewport">
    <div class="card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="logo">✨ Todo</div>
            <h1 class="heading-l" style="margin-top: 16px;">Reset Password</h1>
            <p class="text-s">Enter your email to receive a reset link</p>
        </div>
        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
        {{if .Success}}<div class="alert-success">{{.Success}}</div>{{end}}

        <form method="POST" action="/forgot-password">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary">Send Reset Link</button>
        </form>

        <p class="text-s" style="text-align: center; margin-top: 20px;">
            Remembered your password? <a href="/login"
                style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign in</a>
        </p>
    </div>
</body>

</html>
