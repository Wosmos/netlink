<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>
<body class="dashboard-view">
    <nav>
        <div class="nav-container">
            <div class="logo">✨ Todo</div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span class="user-email">{{.User.Email}}</span>
                <form action="/logout" method="POST" style="margin: 0;">
                    <button type="submit" class="btn btn-logout">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="add-form">
            <form action="/add" method="POST" class="input-group">
                <input type="text" name="task" class="task-input" placeholder="What needs to be done?" required>
                <button type="submit" class="btn btn-add">Add Task</button>
            </form>
        </div>

        {{if .Tasks}}
            {{range .Tasks}}
            <div class="todo-item {{if .Completed}}completed{{end}}">
                <form action="/toggle" method="POST" style="display: flex; align-items: center; margin: 0;">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <input type="checkbox" class="custom-check" {{if .Completed}}checked{{end}} onchange="this.form.submit()">
                </form>
                <span class="todo-text">{{.Text}}</span>
                <span class="task-date">{{.CreatedAt.Format "Jan 2, 15:04"}}</span>
                <form action="/delete" method="POST" style="margin: 0;">
                    <input type="hidden" name="id" value="{{.ID}}">
                    <button type="submit" class="btn btn-delete">Delete</button>
                </form>
            </div>
            {{end}}
        {{else}}
            <div class="empty-state">
                <h3>No tasks yet!</h3>
                <p>Add your first task above to get started.</p>
            </div>
        {{end}}
    </div>
</body>
</html>
