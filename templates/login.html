<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Todo App</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>
<body class="center-viewport">
    <div class="card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="logo">✨ Todo</div>
            <h1 class="heading-l" style="margin-top: 16px;">Welcome Back</h1>
            <p class="text-s">Sign in to your account</p>
        </div>
        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
        <form method="POST" action="/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="text-s" style="text-align: center; margin-top: 20px;">
            Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign up</a>
        </p>
    </div>
</body>
</html>
