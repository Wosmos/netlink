<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Todo App</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>

<body class="center-viewport">
    <div class="card auth-card">
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="logo">✨ Todo</div>
            <h1 class="heading-l" style="margin-top: 16px;">New Password</h1>
            <p class="text-s">Set a new password for your account</p>
        </div>
        {{if .Error}}<div class="alert-error">{{.Error}}</div>{{end}}
        {{if .Success}}<div class="alert-success">{{.Success}}</div>{{end}}

        <form method="POST" action="/reset-password">
            <input type="hidden" name="token" value="{{.Token}}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                    autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
    </div>
</body>

</html>
